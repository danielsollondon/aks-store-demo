name: deploy-to-aks

on:
  push:
    branches:
      - main
    paths:
      - 'deploy/**'
      - '.github/workflows/deploy-to-aks.yml'

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  CLUSTER_NAME: clu-10849
  RESOURCE_GROUP: dansol19959
  NAMESPACE: aks-store-pipe
  APP_NAME: aks-store-demo

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --name "${{ env.CLUSTER_NAME }}" \
            --overwrite-existing

      - name: Install kubelogin
        uses: azure/use-kubelogin@76597ae0fcbaace21b05e13a2cbf8daee2c6e820 # v1
        with:
          kubelogin-version: "v0.2.8"

      - name: Set up kubelogin for non-interactive login
        run: kubelogin convert-kubeconfig -l azurecli

      - name: Create namespace
        run: |
          kubectl create namespace "${{ env.NAMESPACE }}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy application
        run: |
          kubectl apply -f deploy/aks-store-demo-deployment.yml \
            --namespace "${{ env.NAMESPACE }}"

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/"${{ env.APP_NAME }}" \
            --namespace "${{ env.NAMESPACE }}" \
            --timeout=300s
